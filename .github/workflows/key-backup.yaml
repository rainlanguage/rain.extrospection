name: Key backup
# One-shot extraction of `secrets.PRIVATE_KEY_DEV` for backup before rotation.
# The workflow encrypts the secret with a hardcoded age public key and
# uploads the ciphertext as a workflow artifact. The secret value never
# appears in logs (GitHub auto-masks it) and the ciphertext is unreadable
# without the matching age identity file held offline by the recipient.
#
# Usage:
#   1. Dispatch this workflow.
#   2. Download the `encrypted-key` artifact.
#   3. Decrypt: `age --decrypt --identity ~/.config/age/rain-extrospection-backup.txt backup.age`.
#   4. Delete this workflow file once the backup is verified.
on:
  workflow_dispatch:
jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      # age public key controlled by thedavidmeister; matching identity
      # file is at ~/.config/age/rain-extrospection-backup.txt offline.
      AGE_RECIPIENT: age1ysfdsya27yecvsyknchafkwdvuh9yldgqyxf0lt56u5wszmsdd5sx3lc5f
      # Wallet address PRIVATE_KEY_DEV derives to (surfaced by the
      # discovery dispatch at run 25600097612). Re-deriving and matching
      # here catches a rotated/wrong key before exfiltrating its
      # ciphertext.
      EXPECTED_ADDRESS: '0x249Fa65339049de31e43110630B7744c468F6f6C'
    steps:
      - uses: actions/checkout@v4
      - uses: nixbuild/nix-quick-install-action@v30
      - name: Verify PRIVATE_KEY_DEV derives to EXPECTED_ADDRESS
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY_DEV }}
        run: |
          if [[ -z "$PRIVATE_KEY" ]]; then
            echo "::error::PRIVATE_KEY_DEV secret is not set"
            exit 1
          fi
          # nix develop's shellHook emits pre-commit + foundry banner output
          # before cast's address line. Take the last non-empty line so the
          # address is what gets compared, not the full shellHook log.
          actual=$(nix develop -c cast wallet address --private-key "$PRIVATE_KEY" | grep -E '^0x[0-9a-fA-F]{40}$' | tail -n1)
          # Address is public, safe to echo. Compare case-insensitive.
          actual_lower=${actual,,}
          expected_lower=${EXPECTED_ADDRESS,,}
          if [[ "$actual_lower" != "$expected_lower" ]]; then
            echo "::error::PRIVATE_KEY_DEV derives to $actual but expected $EXPECTED_ADDRESS — refusing to back up the wrong key"
            exit 1
          fi
          echo "Verified: PRIVATE_KEY_DEV derives to $actual"
      - name: Encrypt secret
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY_DEV }}
        run: |
          printf '%s' "$PRIVATE_KEY" | nix develop -c age --recipient "$AGE_RECIPIENT" --output backup.age
          ls -la backup.age
      - name: Upload encrypted artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-key
          path: backup.age
          retention-days: 1
