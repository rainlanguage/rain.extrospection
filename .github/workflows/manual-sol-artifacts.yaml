name: Manual sol artifacts
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1G
      - name: Require deployment key
        env:
          MAIN_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          if [[ -z "$MAIN_KEY" ]]; then
            echo "::error::PRIVATE_KEY secret must be set"
            exit 1
          fi
      - name: deploy
        run: nix develop -c rainix-sol-artifacts
        env:
          DEPLOY_BROADCAST: '1'
          # Skip on-chain simulation: the Zoltu factory's bytecode-driven CREATE
          # path can fail eth_call dry-runs on networks where blockhash or other
          # block-derived state isn't predictable in simulation, even when the
          # actual broadcast succeeds. Trade-off: lose the pre-broadcast guard
          # against straightforward reverts.
          DEPLOY_SKIP_SIMULATION: '1'
          DEPLOYMENT_KEY: ${{ secrets.PRIVATE_KEY }}
          ETH_RPC_URL: ${{ secrets.CI_DEPLOY_BASE_RPC_URL || vars.CI_DEPLOY_BASE_RPC_URL || '' }}
          CI_DEPLOY_ARBITRUM_RPC_URL: ${{ secrets.CI_DEPLOY_ARBITRUM_RPC_URL || vars.CI_DEPLOY_ARBITRUM_RPC_URL || '' }}
          CI_DEPLOY_BASE_RPC_URL: ${{ secrets.CI_DEPLOY_BASE_RPC_URL || vars.CI_DEPLOY_BASE_RPC_URL || '' }}
          CI_DEPLOY_BASE_SEPOLIA_RPC_URL: ${{ secrets.CI_DEPLOY_BASE_SEPOLIA_RPC_URL || vars.CI_DEPLOY_BASE_SEPOLIA_RPC_URL || '' }}
          CI_DEPLOY_FLARE_RPC_URL: ${{ secrets.CI_DEPLOY_FLARE_RPC_URL || vars.CI_DEPLOY_FLARE_RPC_URL || '' }}
          CI_DEPLOY_POLYGON_RPC_URL: ${{ secrets.CI_DEPLOY_POLYGON_RPC_URL || vars.CI_DEPLOY_POLYGON_RPC_URL || '' }}
          CI_DEPLOY_ARBITRUM_ETHERSCAN_API_KEY: ${{ secrets.CI_DEPLOY_ARBITRUM_ETHERSCAN_API_KEY || '' }}
          CI_DEPLOY_BASE_ETHERSCAN_API_KEY: ${{ secrets.CI_DEPLOY_BASE_ETHERSCAN_API_KEY || '' }}
          CI_DEPLOY_BASE_SEPOLIA_ETHERSCAN_API_KEY: ${{ secrets.CI_DEPLOY_BASE_SEPOLIA_ETHERSCAN_API_KEY || '' }}
          CI_DEPLOY_FLARE_ETHERSCAN_API_KEY: ${{ secrets.CI_DEPLOY_FLARE_ETHERSCAN_API_KEY || '' }}
          CI_DEPLOY_POLYGON_ETHERSCAN_API_KEY: ${{ secrets.CI_DEPLOY_POLYGON_ETHERSCAN_API_KEY || '' }}
          EXPECTED_EXTROSPECT_ADDRESS: ${{ vars.EXPECTED_EXTROSPECT_ADDRESS || '' }}
          EXPECTED_EXTROSPECT_CODEHASH: ${{ vars.EXPECTED_EXTROSPECT_CODEHASH || '' }}
      - name: verify on each network
        # Idempotent: re-runs against the deterministic Zoltu address on every
        # supported network. Works whether the contract was just deployed in
        # this dispatch or already existed from a prior one. Per-chain failures
        # don't abort — verification on a chain where it's already verified
        # returns "Smart-contract already verified" which forge treats as an
        # error; treat each chain independently and surface the result.
        env:
          CI_DEPLOY_ARBITRUM_ETHERSCAN_API_KEY: ${{ secrets.CI_DEPLOY_ARBITRUM_ETHERSCAN_API_KEY || '' }}
          CI_DEPLOY_BASE_ETHERSCAN_API_KEY: ${{ secrets.CI_DEPLOY_BASE_ETHERSCAN_API_KEY || '' }}
          CI_DEPLOY_BASE_SEPOLIA_ETHERSCAN_API_KEY: ${{ secrets.CI_DEPLOY_BASE_SEPOLIA_ETHERSCAN_API_KEY || '' }}
          CI_DEPLOY_FLARE_ETHERSCAN_API_KEY: ${{ secrets.CI_DEPLOY_FLARE_ETHERSCAN_API_KEY || '' }}
          CI_DEPLOY_POLYGON_ETHERSCAN_API_KEY: ${{ secrets.CI_DEPLOY_POLYGON_ETHERSCAN_API_KEY || '' }}
        run: |
          set +e
          fail=0
          for chain in arbitrum base base_sepolia flare polygon; do
            echo "=== $chain ==="
            out=$(nix develop -c forge verify-contract \
              --chain "$chain" \
              --watch \
              0x1BE878af679C1a0A6AC15108b0F4398de1f94506 \
              src/concrete/Extrospect.sol:Extrospect 2>&1)
            ec=$?
            echo "$out"
            if [[ $ec -ne 0 ]] && ! grep -q "already verified" <<<"$out"; then
              echo "::warning::verification on $chain failed (exit $ec)"
              fail=1
            fi
          done
          exit $fail
